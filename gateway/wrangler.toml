name = "claw-shield-gateway"
main = "build/worker/shim.mjs"
compatibility_date = "2026-02-23"

[build]
command = "set PATH=%USERPROFILE%\\.cargo\\bin;%PATH% && cargo install -q worker-build && worker-build --release"

[vars]
# Optional. Defaults to 1 when missing.
OHTTP_KEY_ID = "1"

[env.dev.vars]
OHTTP_KEY_ID = "1"

# Waitlist KV namespace (low-volume, read-heavy — good fit for KV).
[[kv_namespaces]]
binding = "WAITLIST"
id = "295d2cd062274ef6b0eab6401ec7ab16"

# Telemetry D1 database (write-heavy, read-light — much cheaper than KV).
# Create with:  npx wrangler d1 create claw-shield-telemetry
# Then paste the database_id below.
# Run migrations: npx wrangler d1 migrations apply claw-shield-telemetry
[[d1_databases]]
binding = "TELEMETRY_DB"
database_name = "claw-shield-telemetry"
database_id = "88a3d00a-cd51-4343-bc05-961a57ed6e1c"
migrations_dir = "migrations"

# In production, inject secrets with wrangler secret.
# wrangler secret put OHTTP_PRIVATE_KEY_SEED_B64
# wrangler secret put RELAY_SHARED_TOKEN
